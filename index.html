<!doctype html>
<html lang="zh-Hant">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Apink Taipei Dome</title>
  <link rel="stylesheet" href="./styles.css?v=rwd-mobile-1" />
</head>

<body>
  <main class="game" aria-label="Apink baseball game">


    <section class="field" id="field" aria-label="play field">
      <!-- BSOP Scoreboard -->
      <div class="bsop" id="bsopBoard" aria-label="Strikes and Balls board">
        <div class="bsop__row">
          <span class="bsop__label">B</span>
          <div class="bsop__dots">
            <span class="bsop__dot bsop__dot--ball"></span>
            <span class="bsop__dot bsop__dot--ball"></span>
            <span class="bsop__dot bsop__dot--ball"></span>
            <span class="bsop__dot bsop__dot--ball"></span>
          </div>
        </div>
        <div class="bsop__row">
          <span class="bsop__label">S</span>
          <div class="bsop__dots">
            <span class="bsop__dot bsop__dot--strike"></span>
            <span class="bsop__dot bsop__dot--strike"></span>
            <span class="bsop__dot bsop__dot--strike"></span>
          </div>
        </div>
        <div class="bsop__row">
          <span class="bsop__label">O</span>
          <div class="bsop__dots">
            <span class="bsop__dot bsop__dot--out"></span>
            <span class="bsop__dot bsop__dot--out"></span>
            <span class="bsop__dot bsop__dot--out"></span>
          </div>
        </div>
      </div>

      <!-- Scorebar centered at the top -->
      <div class="scorebar" id="scorebar" aria-live="polite">
        <div class="metric">
          <span class="metric__label">得分</span>
          <strong id="score">0</strong>
        </div>
        <div class="status" id="status">準備</div>
      </div>

      <!-- Base Running Diagram -->
      <div class="bases" id="basesBoard" aria-label="Base runners status">
        <div class="base-diamond base-diamond--2nd" id="base2"></div>
        <div class="base-diamond base-diamond--3rd" id="base3"></div>
        <div class="base-diamond base-diamond--1st" id="base1"></div>
      </div>

      <div class="dome-line dome-line--back"></div>
      <div class="dome-line dome-line--front"></div>
      <div class="base-line"></div>

      <div class="sprite sprite--cheerleader sprite--cheerleader-najoo" data-component="cheerleader-najoo">
        <img id="cheerFrameNajoo" src="./assets/najoo_support_frames/najoo_support_01.png" alt="Namjoo cheerleader"
          draggable="false" />
      </div>

      <div class="sprite sprite--cheerleader sprite--cheerleader-enji" data-component="cheerleader">
        <img id="cheerFrame" src="./assets/enji_support_happy_frames/enji_support_happy_01.png" alt="Eunji cheerleader"
          draggable="false" />
      </div>

      <div class="sprite sprite--cheerleader sprite--cheerleader-hayoung" data-component="cheerleader-hayoung">
        <img id="cheerFrameHayoung" src="./assets/hayoung_support_frames/hayoung_support_01.png"
          alt="Hayoung cheerleader" draggable="false" />
      </div>

      <div class="sprite sprite--pitcher" data-component="pitcher">
        <div class="pitcher-mound" aria-hidden="true">
          <div class="pitcher-plate"></div>
        </div>
        <img id="pitcherFrame" src="./assets/bomi_throw_frames/bomi_throw_01.png" alt="Bomi pitcher"
          draggable="false" />
      </div>

      <div class="sprite sprite--batter" data-component="batter">
        <div class="batter-box-area" aria-hidden="true">
          <div class="batter-box"></div>
          <div class="home-plate"></div>
        </div>
        <img id="batterFrame" src="./assets/chorong_swing_frames/chorong_swing_01.png" alt="Chorong batter"
          draggable="false" />
      </div>

      <div class="ball" id="ball" data-component="ball" aria-hidden="true"></div>
      <div class="result-pop" id="resultPop" aria-hidden="true"></div>

      <!-- Game Over Overlay -->
      <div class="game-over-overlay" id="gameOverOverlay" aria-hidden="true">
        <div class="game-over-box">
          <h2>遊戲結束</h2>
          <p>總得分: <strong id="finalScore">0</strong></p>
          <button class="restart-button" id="restartButton" type="button">重新開始</button>

          <!-- Handle Input Group -->
          <div class="game-over-input-group">
            <input type="text" class="game-over-input" id="leaderboardHandle" placeholder="輸入 IG 或 Threads 帳號"
              maxlength="28" />
            <button class="submit-score-btn" id="submitScoreButton" type="button">結算成績</button>
          </div>
        </div>
      </div>

      <!-- Leaderboard Overlay -->
      <div class="leaderboard-overlay" id="leaderboardOverlay" aria-hidden="true">
        <div class="leaderboard-box">
          <h2>台北大巨蛋 排行榜</h2>

          <div class="leaderboard-table-container">
            <table class="leaderboard-table">
              <thead>
                <tr>
                  <th>排名</th>
                  <th>帳號</th>
                  <th>得分</th>
                </tr>
              </thead>
              <tbody id="leaderboardBody">
                <!-- Generated by JS -->
              </tbody>
            </table>
            <div class="leaderboard-divider"></div>
            <div class="leaderboard-my-rank" id="leaderboardMyRank">
              <!-- User's rank generated by JS -->
            </div>
          </div>

          <!-- Cheer message panel -->
          <div class="cheer-panel" id="cheerPanel">
            <div class="cheer-templates" id="cheerTemplates">
              <button type="button" class="cheer-template-chip">Apink 💖 台北大巨蛋衝呀！</button>
              <button type="button" class="cheer-template-chip">永遠支持 Apink！🐼🌸</button>
              <button type="button" class="cheer-template-chip">普美投球超帥，初瓏全壘打！</button>
              <button type="button" class="cheer-template-chip">大巨蛋滿座！Apink 萬歲！</button>
            </div>
            <textarea id="cheerInput" placeholder="留下應援的話...（限200字，支援空白）" maxlength="200"></textarea>
            <button class="cheer-submit-btn" id="cheerSubmitBtn">送出應援</button>
          </div>

          <button class="restart-button" id="leaderboardCloseButton">繼續挑戰</button>
        </div>
      </div>
    </section>

  </main>

  <script src="./app.js?v=bomi-recrop-1" defer></script>
</body>

</html>

    <button type="button" class="cheer-template-chip">普美投球超帥，初瓏全壘打！</button>

</div>

<button class="restart-button" id="leaderboardCloseButton">繼續挑戰</button>
</div>
</div>

<div class="notice-toast" id="noticeToast" role="status" aria-live="polite" aria-hidden="true">
  <span id="noticeToastText"></span>
</div>
</section>

</main>

</div>

</html>
